<div class="product-management-container">
  <!-- Page Header -->
  <app-top-bar title="Product Management">
    <app-button variant="primary" size="sm" (click)="openAddProductDialog()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Add Product
    </app-button>
    <app-button variant="ghost" size="sm" (click)="refreshData()" [disabled]="isLoading">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
      </svg>
    </app-button>
  </app-top-bar>

  <div class="page-body">
  <!-- Loading State -->
  <app-loading-spinner *ngIf="isLoading" message="Loading products..."></app-loading-spinner>

  <div class="product-management-content" *ngIf="!isLoading">

    <!-- KPI STRIP -->
    <app-kpi-strip [kpis]="kpiItems"></app-kpi-strip>

    <!-- Main List Panel -->
    <div class="panel">
      <app-filter-bar
        title="Product Catalog"
        subtitle="Manage your inventory and pricing"
        searchPlaceholder="Search products..."
        [searchValue]="searchTerm"
        [sortOptions]="sortOptions"
        [sortValue]="sortBy"
        [categories]="categories"
        [selectedCategory]="selectedCategory"
        (searchChange)="onSearchChange($event)"
        (sortChange)="onSortChange($event)"
        (categoryChange)="onCategoryChange($event)">
      </app-filter-bar>

      <!-- Bulk Action Bar -->
      <div class="bulk-action-bar" *ngIf="selectedProducts.length > 0">
        <span class="selection-count">{{ selectedProducts.length }} selected</span>
        <app-button variant="danger" size="sm" (click)="deleteSelectedProducts()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          Delete Selected
        </app-button>
      </div>

      <app-data-table
        [columns]="tableColumns"
        [data]="filteredProducts"
        [clickable]="true"
        [selectable]="true"
        emptyIcon="📦"
        [emptyTitle]="searchTerm ? 'No results' : 'No products yet'"
        [emptyMessage]="searchTerm ? 'No products match your search' : 'Add your first product to get started'"
        [emptyAction]="searchTerm ? '' : 'Add First Product'"
        (rowClick)="editProduct($event)"
        (selectionChange)="onSelectionChange($event)"
        (sortChange)="onColumnSort($event)"
        (emptyActionClick)="openAddProductDialog()">

        <ng-template cellDef="product" let-row>
          <div class="product-info-cell">
            <app-image-display [src]="row.image" [size]="36" [alt]="row.name"></app-image-display>
            <div class="product-text">
              <span class="product-name-text">{{ row.name }}</span>
              <span class="product-id-text">#{{ row.id.substring(0, 8) }}</span>
            </div>
          </div>
        </ng-template>

        <ng-template cellDef="category" let-row>
          <app-badge variant="neutral">{{ row.category }}</app-badge>
        </ng-template>

        <ng-template cellDef="price" let-row>
          <span class="price-text">{{ formatPrice(row.price) }}</span>
        </ng-template>

        <ng-template cellDef="stock" let-row>
          <app-stock-indicator [stock]="row.stock" [threshold]="row.lowQuantityThreshold || 10"></app-stock-indicator>
        </ng-template>

        <ng-template cellDef="status" let-row>
          <app-badge [variant]="row.isActive !== false ? 'success' : 'danger'">
            {{ row.isActive !== false ? 'Active' : 'Inactive' }}
          </app-badge>
        </ng-template>

        <ng-template cellDef="actions" let-row>
          <div class="row-actions">
            <button class="action-btn-mini" (click)="editProduct(row); $event.stopPropagation()" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </button>
            <button class="action-btn-mini delete" (click)="deleteProduct(row); $event.stopPropagation()" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
              </svg>
            </button>
          </div>
        </ng-template>
      </app-data-table>
    </div>
  </div>
  </div>
</div>
