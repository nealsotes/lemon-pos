<div class="recipes-container" [class.embedded]="!showHeader">
  <app-top-bar *ngIf="showHeader" title="Product Recipes"></app-top-bar>

  <div class="recipes-content">

    <!-- Product Card Selector -->
    <div class="product-selector">
      <div class="selector-header">
        <div class="selector-title-group">
          <h3 class="selector-title">Select Product</h3>
          <span class="selector-subtitle">Click a product to manage its recipe</span>
        </div>
        <app-search-input
          placeholder="Search products..."
          [value]="productSearchTerm"
          (search)="productSearchTerm = $event">
        </app-search-input>
      </div>

      <app-loading-spinner *ngIf="isLoadingProducts" message="Loading products..."></app-loading-spinner>

      <div class="product-card-grid" *ngIf="!isLoadingProducts">
        <button type="button"
          *ngFor="let p of filteredProducts"
          class="product-card"
          [class.has-recipe]="productRecipeCounts[p.id] > 0"
          (click)="openRecipeDialog(p)">
          <div class="product-card-img">
            <img *ngIf="p.image" [src]="p.image" [alt]="p.name" loading="lazy">
            <div *ngIf="!p.image" class="product-card-placeholder" [style.background]="getProductColor(p.name)">
              {{ p.name.charAt(0).toUpperCase() }}
            </div>
          </div>
          <div class="product-card-body">
            <span class="product-card-name">{{ p.name }}</span>
            <span class="product-card-meta">{{ p.category }}</span>
          </div>
          <span class="product-card-price"
            [innerHTML]="'&#8369;' + ((p.price || 0) | number:'1.2-2')">
          </span>
          <div class="product-card-recipe-badge" *ngIf="productRecipeCounts[p.id] > 0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="10" height="10">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
            {{ productRecipeCounts[p.id] }}
          </div>
        </button>

        <div class="empty-products" *ngIf="filteredProducts.length === 0">
          <p>{{ productSearchTerm ? 'No products match your search' : 'No products found' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
