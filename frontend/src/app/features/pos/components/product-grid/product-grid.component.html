<div class="pos-container ed-backdrop" [class.desktop]="isDesktop">
  <!-- Left: Main POS area -->
  <div class="pos-main">
    <!-- Top Bar -->
    <app-top-bar title="Point of Sale">
      <span *ngIf="!isLoading && filteredProducts.length > 0" class="ed-pill ed-pill--accent">
        {{ filteredProducts.length }} {{ filteredProducts.length === 1 ? 'product' : 'products' }}
      </span>
      <button class="header-icon-btn" (click)="refreshData()" title="Refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
        </svg>
      </button>
      <button class="cart-toggle" (click)="openCartSidebar()" *ngIf="!isDesktop">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zm0 0h12M9 10a3 3 0 006 0"/>
        </svg>
        <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
      </button>
    </app-top-bar>

    <!-- Filters: Search + Category Chips -->
    <div class="pos-filters">
      <app-search-input
        placeholder="Search products..."
        [value]="searchTerm"
        (search)="onSearch($event)">
      </app-search-input>
      <app-chip-group
        [chips]="categories"
        [selected]="selectedCategory"
        allLabel="All"
        (selectedChange)="filterByCategory($event)">
      </app-chip-group>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="loading-state">
      <div class="loading-receipt">
        <span></span><span></span><span></span><span></span>
      </div>
      <p class="ed-eyebrow ed-eyebrow--accent">Loading the menu</p>
    </div>

    <!-- Product Grid -->
    <div *ngIf="!isLoading && paginatedProducts.length > 0" class="product-grid">
      <article *ngFor="let product of paginatedProducts; let i = index; trackBy: trackByProduct"
           class="product-card ed-card ed-card--rail ed-enter"
           [class.out-of-stock]="product.stock <= 0"
           [style.--ed-enter-delay.ms]="i * 24"
           (click)="addToCart(product)">
        <div class="card-image">
          <img *ngIf="isImageLoaded(product)" [src]="product.image" [alt]="product.name" loading="lazy" (error)="onImageError($event, product)">
          <div *ngIf="!isImageLoaded(product)" class="card-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </div>
          <span class="ed-pill ed-pill--warning stock-badge" *ngIf="isLowStock(product) && product.stock > 0">Low</span>
          <span class="ed-pill ed-pill--danger stock-badge" *ngIf="product.stock <= 0">Sold out</span>
        </div>
        <div class="card-body">
          <span class="card-name">{{ product.name }}</span>
          <span class="card-category">{{ product.category }}</span>
          <div class="card-foot">
            <span class="card-price">&#x20B1;{{ product.price | number:'1.2-2' }}</span>
            <span class="card-stock">{{ product.stock }} left</span>
          </div>
        </div>
      </article>
    </div>

    <!-- Load More -->
    <div *ngIf="!isLoading && hasMoreProducts()" class="load-more">
      <button class="ed-btn ed-btn--secondary ed-btn--sm" (click)="loadMoreProducts()">
        Load more
        <svg class="ed-btn__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Empty State -->
    <app-empty-state
      *ngIf="!isLoading && filteredProducts.length === 0"
      title="No products found"
      [message]="searchTerm ? 'Try adjusting your search terms' : 'No products available in this category'"
      actionLabel="Refresh Products"
      (action)="refreshData()">
    </app-empty-state>
  </div>

  <!-- Right: Inline order panel (desktop only) -->
  <div class="order-panel" *ngIf="isDesktop">
    <app-pos-cart-sidebar
      *ngIf="currentView === 'cart'"
      [inline]="true"
      [isOpen]="true"
      (checkout)="proceedToCheckout()">
    </app-pos-cart-sidebar>
    <app-checkout-sidebar
      *ngIf="currentView === 'checkout'"
      [inline]="true"
      [isOpen]="true"
      (back)="backToCart()"
      (close)="backToCart()"
      (transactionComplete)="onTransactionComplete($event)">
    </app-checkout-sidebar>
  </div>

  <!-- Mobile overlays -->
  <ng-container *ngIf="!isDesktop">
    <app-pos-cart-sidebar [isOpen]="isCartOpen" (close)="closeCartSidebar()" (checkout)="proceedToCheckout()">
    </app-pos-cart-sidebar>
    <app-checkout-sidebar [isOpen]="isCheckoutOpen" (close)="closeCheckout()"
      (transactionComplete)="onTransactionComplete($event)">
    </app-checkout-sidebar>
  </ng-container>
</div>
