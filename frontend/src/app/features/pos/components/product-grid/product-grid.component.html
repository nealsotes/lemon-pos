<div class="product-grid-container">

  <!-- Page Header (shared layout) -->
  <app-page-header title="Lemon POS Advance" subtitle="Point of Sale">
    <button class="header-btn compact-btn" (click)="refreshData()" title="Refresh System">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <button (click)="openCartSidebar()" class="cart-btn" [class.has-items]="cartItemCount > 0"
      title="View Order Cart">
      <div class="cart-icon-wrapper">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M3 3h2l.4 2M7 13h10l4-8H5.4m0 0L7 13m0 0l-2.5 5M7 13l2.5 5m-4 5a1 1 0 11-2 0 1 1 0 012 0zm-8 0a1 1 0 11-2 0 1 1 0 012 0z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span *ngIf="cartItemCount > 0" class="cart-badge">{{ cartItemCount }}</span>
      </div>
      <span class="cart-text">Cart</span>
    </button>
  </app-page-header>

  <!-- Product Filters -->
  <app-product-filters [categories]="categories" [selectedCategory]="selectedCategory" [searchTerm]="searchTerm"
    (search)="onSearch($event)" (categoryChange)="filterByCategory($event)">
  </app-product-filters>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading products...</p>
  </div>

  <!-- Products Grid -->
  <div *ngIf="!isLoading" class="products-grid">
    <app-product-card *ngFor="let product of paginatedProducts; trackBy: trackByProduct; let i = index"
      [product]="product" [index]="i" (addToCart)="addToCart($event)">
    </app-product-card>
  </div>

  <!-- Load More Button -->
  <div *ngIf="!isLoading && hasMoreProducts()" class="load-more-container">
    <button class="btn btn-primary load-more-btn" (click)="loadMoreProducts()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      Load More Products
    </button>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && filteredProducts.length === 0" class="empty-state">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <h3 class="empty-title">No products found</h3>
    <p class="empty-description">
      {{ searchTerm ? 'Try adjusting your search terms' : 'No products available in this category' }}
    </p>
    <button class="btn btn-primary" (click)="refreshData()">
      Refresh Products
    </button>
  </div>

  <!-- Cart Sidebar Component -->
  <app-pos-cart-sidebar [isOpen]="isCartOpen" (close)="closeCartSidebar()" (checkout)="proceedToCheckout()">
  </app-pos-cart-sidebar>

  <!-- Checkout Sidebar -->
  <app-checkout-sidebar [isOpen]="isCheckoutOpen" (close)="closeCheckout()"
    (transactionComplete)="onTransactionComplete($event)"></app-checkout-sidebar>
</div>
