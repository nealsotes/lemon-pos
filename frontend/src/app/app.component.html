<div class="app-shell" [class.has-nav]="!isLoginPage">
  <!-- Nav Rail (desktop) -->
  <app-nav-rail
    *ngIf="!isLoginPage"
    [cartItemCount]="cartItemCount"
    [isDarkMode]="isDarkMode"
    (toggleTheme)="toggleTheme()"
    (logout)="logout()">
  </app-nav-rail>

  <!-- Main area -->
  <div class="app-main">
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Bottom Tab Bar (mobile) -->
  <app-bottom-tab-bar
    *ngIf="!isLoginPage"
    [cartItemCount]="cartItemCount"
    [isDarkMode]="isDarkMode"
    (toggleTheme)="toggleTheme()"
    (logout)="logout()">
  </app-bottom-tab-bar>

  <!-- PWA Install Banner -->
  <app-pwa-install></app-pwa-install>

  <!-- Global overlays -->
  <app-toast></app-toast>
  <app-confirm-dialog></app-confirm-dialog>
</div>
